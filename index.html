<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ministat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d1117;
      --text: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --border-dim: #21262d;
      --hover-bg: #161b22;
      --link: #58a6ff;
      --btn-bg: #21262d;
      --btn-hover: #30363d;
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --text: #1f2328;
      --muted: #656d76;
      --border: #d0d7de;
      --border-dim: #d8dee4;
      --hover-bg: #f6f8fa;
      --link: #0969da;
      --btn-bg: #f0f0f0;
      --btn-hover: #e0e0e0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .toggle-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .toggle-group button {
      background: var(--btn-bg);
      color: var(--muted);
      border: none;
      border-right: 1px solid var(--border);
      padding: 5px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }
    .toggle-group button:last-child { border-right: none; }
    .toggle-group button:hover { background: var(--btn-hover); }
    .toggle-group button.active {
      background: var(--link);
      color: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th .sort-arrow { margin-left: 4px; }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-dim);
      font-size: 0.875rem;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    tr:hover td { background: var(--hover-bg); }
    .name { color: var(--link); }
    .high { color: #f85149; }
    .medium { color: #d29922; }
    .low { color: #3fb950; }
    .error {
      color: #f85149;
      text-align: center;
      padding: 40px;
    }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }
    .paused-label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    @media (max-width: 768px) {
      .hide-small { display: none; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>ministat</h1>
      <div class="subtitle" id="status-text">Refreshing every 5 seconds</div>
    </div>
    <div class="controls">
      <div class="toggle-group" id="theme-toggle">
        <button data-value="light">Light</button>
        <button data-value="dark">Dark</button>
        <button data-value="system">System</button>
      </div>
      <div class="toggle-group" id="update-toggle">
        <button data-value="live">Live</button>
        <button data-value="paused">Paused</button>
      </div>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th data-key="Name">Container</th>
        <th data-key="CPUPerc">CPU %</th>
        <th data-key="MemUsage">Mem Usage</th>
        <th data-key="MemPerc">Mem %</th>
        <th data-key="NetIO" class="hide-small">Net I/O</th>
        <th data-key="BlockIO" class="hide-small">Block I/O</th>
        <th data-key="PIDs" class="hide-small">PIDs</th>
      </tr>
    </thead>
    <tbody id="stats-body">
      <tr><td colspan="7" class="empty">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    let currentData = [];
    let sortKey = null;
    let sortAsc = true;
    let paused = false;
    let intervalId = null;

    function setToggle(groupId, value) {
      document.querySelectorAll(`#${groupId} button`).forEach(btn => {
        btn.classList.toggle("active", btn.dataset.value === value);
      });
    }

    // Theme
    let currentTheme = localStorage.getItem("ministat-theme") || "dark";

    function applyTheme() {
      if (currentTheme === "system") {
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      } else {
        document.documentElement.setAttribute("data-theme", currentTheme);
      }
      setToggle("theme-toggle", currentTheme);
      localStorage.setItem("ministat-theme", currentTheme);
    }

    applyTheme();

    document.getElementById("theme-toggle").addEventListener("click", (e) => {
      if (!e.target.dataset.value) return;
      currentTheme = e.target.dataset.value;
      applyTheme();
    });

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (currentTheme === "system") applyTheme();
    });

    // Pause/resume
    setToggle("update-toggle", "live");

    document.getElementById("update-toggle").addEventListener("click", (e) => {
      if (!e.target.dataset.value) return;
      const status = document.getElementById("status-text");
      if (e.target.dataset.value === "paused" && !paused) {
        paused = true;
        clearInterval(intervalId);
        intervalId = null;
        status.textContent = "Updates paused";
      } else if (e.target.dataset.value === "live" && paused) {
        paused = false;
        status.textContent = "Refreshing every 5 seconds";
        fetchStats();
        intervalId = setInterval(fetchStats, 5000);
      }
      setToggle("update-toggle", e.target.dataset.value);
    });

    function cpuClass(val) {
      const n = parseFloat(val);
      if (n > 80) return "high";
      if (n > 40) return "medium";
      return "low";
    }

    function memClass(val) {
      const n = parseFloat(val);
      if (n > 80) return "high";
      if (n > 50) return "medium";
      return "low";
    }

    function parseNumeric(val) {
      return parseFloat(val) || 0;
    }

    function sortData(data) {
      if (!sortKey) return data;
      return [...data].sort((a, b) => {
        const aVal = a[sortKey];
        const bVal = b[sortKey];
        if (sortKey === "Name") {
          const cmp = aVal.localeCompare(bVal);
          return sortAsc ? cmp : -cmp;
        }
        const cmp = parseNumeric(aVal) - parseNumeric(bVal);
        return sortAsc ? cmp : -cmp;
      });
    }

    function updateSortArrows() {
      document.querySelectorAll("th").forEach(th => {
        const arrow = th.querySelector(".sort-arrow");
        if (arrow) arrow.remove();
        if (th.dataset.key === sortKey) {
          const span = document.createElement("span");
          span.className = "sort-arrow";
          span.textContent = sortAsc ? "\u25B2" : "\u25BC";
          th.appendChild(span);
        }
      });
    }

    function renderTable(data) {
      const tbody = document.getElementById("stats-body");

      if (data.error) {
        tbody.innerHTML = '<tr><td colspan="7" class="error">Error: ' + data.error + "</td></tr>";
        return;
      }

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">No running containers</td></tr>';
        return;
      }

      const sorted = sortData(data);
      tbody.innerHTML = sorted.map(c => `
        <tr>
          <td class="name">${c.Name}</td>
          <td class="${cpuClass(c.CPUPerc)}">${c.CPUPerc}</td>
          <td>${c.MemUsage}</td>
          <td class="${memClass(c.MemPerc)}">${c.MemPerc}</td>
          <td class="hide-small">${c.NetIO}</td>
          <td class="hide-small">${c.BlockIO}</td>
          <td class="hide-small">${c.PIDs}</td>
        </tr>
      `).join("");
    }

    document.querySelectorAll("th[data-key]").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.key;
        if (sortKey === key) {
          sortAsc = !sortAsc;
        } else {
          sortKey = key;
          sortAsc = true;
        }
        updateSortArrows();
        renderTable(currentData);
      });
    });

    async function fetchStats() {
      try {
        const res = await fetch("/api/stats");
        const data = await res.json();
        currentData = data;
        renderTable(data);
      } catch (err) {
        document.getElementById("stats-body").innerHTML =
          '<tr><td colspan="7" class="error">Failed to fetch stats</td></tr>';
      }
    }

    fetchStats();
    intervalId = setInterval(fetchStats, 5000);
  </script>
</body>
</html>
